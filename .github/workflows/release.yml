name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build gem
        run: gem build omniauth-slack2.gemspec

      - name: Publish gem
        run: gem push omniauth-slack2-*.gem
